apiVersion: v1
kind: Namespace
metadata:
  name: bangfs
---
# Headless service for peer discovery during cluster formation.
# publishNotReadyAddresses ensures pods appear in DNS before passing
# readiness checks, which is needed for initial cluster bootstrapping.
apiVersion: v1
kind: Service
metadata:
  name: riak-headless
  namespace: bangfs
  labels:
    app: riak
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: riak
  ports:
    - name: http
      port: 8098
      targetPort: 8098
    - name: protobuf
      port: 8087
      targetPort: 8087
---
# Client-facing service for applications that talk to Riak.
apiVersion: v1
kind: Service
metadata:
  name: riak
  namespace: bangfs
  labels:
    app: riak
spec:
  selector:
    app: riak
  ports:
    - name: http
      port: 8098
      targetPort: 8098
    - name: protobuf
      port: 8087
      targetPort: 8087
---
# We use a stateful set because riak nodes in a cluster still have
# a fixed identity. We would like it if nodes were automatically
# removed from the cluster by riak if they are failed for some time
# but it doesn't look like its the case and riak-admin command must
# be used.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: riak
  namespace: bangfs
  labels:
    app: riak
spec:
  serviceName: riak-headless
  podManagementPolicy: "Parallel"
  replicas: 4
  selector:
    matchLabels:
      app: riak
  template:
    metadata:
      labels:
        app: riak
    spec:
    # Make scheduler try not to place riak pods on the same node,
    # i.e., distribute them among nodes for reliability.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - riak
              topologyKey: topology.kubernetes.io/zone
      terminationGracePeriodSeconds: 120
      containers:
        - name: riak
          #image: ghcr.io/gosub2k/riak-docker:main
          image: localhost:30500/bangriak
          env:
            - name: RIAK_CONF_INITIAL_DATA
              valueFrom:
                configMapKeyRef:
                  name: riak-conf
                  key: conf-file
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - name: http
              containerPort: 8098
            - name: protobuf
              containerPort: 8087
            - name: epmd
              containerPort: 4369
            - name: handoff
              containerPort: 8099
          securityContext:
            privileged: true
          volumeMounts:
            - name: riak-data
              mountPath: /opt/riak/data
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1"
          readinessProbe:
            httpGet:
              path: /ping
              port: 8098
            initialDelaySeconds: 120
            periodSeconds: 20
          livenessProbe:
            httpGet:
              path: /ping
              port: 8098
            initialDelaySeconds: 240
            periodSeconds: 30
          # lifecycle:
          #   preStop:
          #     exec:
                # command:
                #   - /bin/bash
                #   - -c
                #   - |
                #     export PATH="/opt/riak/bin:$PATH"
                #     riak-admin cluster leave
                #     riak-admin cluster plan
                #     riak-admin cluster commit
                #     sleep 5
                #     riak stop
  volumeClaimTemplates:
    - metadata:
        name: riak-data
      spec:
        accessModes: ["ReadWriteOnce"]
        # Use default storagepath
        #storageClassName: microk8s-hostpath
        resources:
          requests:
            storage: 10Gi
          limits:
            storage: 10Gi

    
